services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    volumes:
      - api_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_PATH=/app/data/liushui.db
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-https://your.domain.com}
    healthcheck:
      test: wget -qO- http://localhost:3001/api/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  api_data:
